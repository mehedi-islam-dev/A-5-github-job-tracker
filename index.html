<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - GitHub Issue Tracker</title>
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<style>
    *{
        font-family: "Geist", sans-serif;
    }
</style>
</head>
<body class="bg-[#FFFFFF] flex items-center justify-center min-h-screen">
    
    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-sm border border-gray-100 mx-4 my-8">
    
    <div class="flex justify-center mb-4">
        <img src="./images/github-logo.png" alt="" class="h-16 w-auto">
    </div>

    <h1 class="text-2xl font-bold text-center text-gray-900 mb-1">GitHub Issues Tracker</h1>
    <p class="text-sm text-center text-gray-500 mb-6">Sign in to manage your issues</p>

    <form id="login-form" class="space-y-4">
        
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" id="username" class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#4f23ff] focus:border-[#4f23ff] text-sm" placeholder="Enter Username" required>
            <p class="text-xs text-[#4f23ff] mt-1 font-medium">Default: admin</p>
        </div>
        
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#4f23ff] focus:border-[#4f23ff] text-sm" placeholder="Enter Password" required>
            <p class="text-xs text-[#4f23ff] mt-1 font-medium">Default: admin123</p>
        </div>

        <button type="submit" class="w-full py-2.5 px-4 rounded-md text-sm font-medium text-white bg-[#4f23ff] hover:bg-[#3d19d6] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#4f23ff] transition-colors mt-2">
            Sign In
        </button>
    </form>

    <div class="relative flex py-5 items-center">
        <div class="flex-grow border-t border-gray-200"></div>
        <span class="flex-shrink-0 mx-4 text-gray-400 text-xs">OR</span>
        <div class="flex-grow border-t border-gray-200"></div>
    </div>

    <div class="text-center">
        <p class="text-xs text-gray-500 mb-3">Demo Credentials:</p>
        <div class="bg-[#f8f9fa] p-4 rounded-lg border border-gray-100">
            <p class="text-sm text-gray-800"><strong>Username:</strong> admin</p>
            <p class="text-sm text-gray-800"><strong>Password:</strong> admin123</p>
        </div>
    </div>
    
</div>
    <script src="login.js"></script>
</body>

</html>
